<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>好日子・記錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Cormorant+SC:wght@300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;-webkit-font-smoothing:antialiased;}
body{
  font-family:'Noto Serif TC',serif;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(244,155,170,0.45) 0%, transparent 52%),
    radial-gradient(ellipse at 88% 12%, rgba(245,182,72,0.40) 0%, transparent 48%),
    radial-gradient(ellipse at 50% 62%, rgba(242,120,82,0.28) 0%, transparent 52%),
    radial-gradient(ellipse at 18% 92%, rgba(244,130,155,0.28) 0%, transparent 42%),
    radial-gradient(ellipse at 82% 88%, rgba(245,195,88,0.25) 0%, transparent 42%),
    linear-gradient(135deg, #fde8dc 0%, #fef0e2 40%, #fef6ee 70%, #fef0e0 100%);
  min-height:100vh;
  overflow-x:hidden;
}
:root{
  --text:   rgba(40,14,4,0.90);
  --text-m: rgba(40,14,4,0.65);
  --text-s: rgba(40,14,4,0.40);
  --gold:   #8a5520;
  --border: rgba(138,85,32,0.22);
  --bg-opt: rgba(138,85,32,0.04);
  --bg-sel: rgba(138,85,32,0.12);
}

/* ── 頂部 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 22px 12px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(254,232,220,0.85);
  backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);
}
.top-logo{font-family:'Cormorant SC',serif;font-size:14px;font-weight:300;letter-spacing:0.52em;color:var(--text-m);text-transform:uppercase;}
.top-date{font-size:10px;font-weight:200;letter-spacing:0.16em;color:var(--text-s);}

/* ── 進度條（固定在頂部下方）── */
.prog-bar-wrap{
  position:fixed;top:49px;left:0;right:0;z-index:99;
  display:flex;gap:3px;padding:0;
  background:rgba(254,232,220,0.85);
}
.prog-seg{height:2px;flex:1;background:rgba(138,85,32,0.12);transition:background 0.35s;}
.prog-seg.done{background:rgba(138,85,32,0.48);}

/* ── 主內容 ── */
.main{
  padding-top:66px;
  padding-bottom:40px;
  max-width:560px;
  margin:0 auto;
  padding-left:22px;
  padding-right:22px;
}

/* ── 步驟頭部 ── */
.step-head{
  padding:28px 0 20px;
}
.q-num{font-size:10px;font-weight:300;letter-spacing:0.32em;color:var(--text-s);margin-bottom:6px;}
.q-title{font-size:clamp(20px,4.5vw,28px);font-weight:200;letter-spacing:0.08em;line-height:1.2;color:var(--text);}
.q-sub{font-size:11px;font-weight:200;letter-spacing:0.16em;color:var(--text-s);margin-top:6px;}

/* ── 步驟 ── */
.step{display:none;}
.step.active{display:block;animation:fadeUp 0.32s cubic-bezier(0.16,1,0.3,1) forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 分隔線 */
.divider{width:28px;height:0.5px;background:rgba(138,85,32,0.35);margin:0 0 18px;}

/* ── 選項 ── */
.opts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.opts.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}

.opt{
  font-family:'Noto Serif TC',serif;
  font-size:13px;font-weight:300;
  color:var(--text-m);
  background:rgba(255,255,255,0.55);
  border:0.5px solid var(--border);
  padding:10px 14px;
  cursor:pointer;text-align:left;line-height:1.4;
  letter-spacing:0.04em;
  transition:background 0.12s,border-color 0.12s,color 0.12s;
  backdrop-filter:blur(4px);
}
.opt:hover{background:rgba(255,255,255,0.80);border-color:rgba(138,85,32,0.40);color:var(--text);}
.opt.sel{background:rgba(138,85,32,0.12);border-color:rgba(138,85,32,0.50);color:var(--gold);font-weight:400;}

/* 區塊標籤 */
.sect{font-size:9px;letter-spacing:0.28em;color:var(--text-s);text-transform:uppercase;margin:16px 0 9px;display:flex;align-items:center;gap:7px;}
.sect::before{content:'';display:block;width:12px;height:0.5px;background:rgba(138,85,32,0.28);}

/* 安眠藥子層 */
.med-layer{display:none;background:rgba(255,255,255,0.40);border:0.5px solid rgba(138,85,32,0.10);padding:12px;margin-top:-12px;margin-bottom:16px;}
.med-layer.open{display:block;}

/* 溫度 */
.temp-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}

/* 備注 */
.note-label{font-size:9px;letter-spacing:0.28em;color:var(--text-s);text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:7px;}
.note-label::before{content:'';display:block;width:12px;height:0.5px;background:rgba(138,85,32,0.28);}
.note-inp{width:100%;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:300;letter-spacing:0.05em;border:none;border-bottom:0.5px dashed rgba(138,85,32,0.20);background:transparent;padding:6px 2px;resize:none;outline:none;color:var(--text);line-height:1.9;min-height:48px;}
.note-inp::placeholder{color:var(--text-s);}

/* 導航 */
.nav{display:flex;gap:8px;margin-top:20px;}
.btn-n{flex:1;font-family:'Noto Serif TC',serif;font-size:11px;font-weight:300;letter-spacing:0.28em;padding:13px 14px;border:0.5px solid rgba(138,85,32,0.35);background:rgba(255,255,255,0.40);color:var(--text-m);cursor:pointer;text-transform:uppercase;transition:border-color 0.12s,color 0.12s,background 0.12s;backdrop-filter:blur(4px);}
.btn-n:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,255,255,0.65);}
.btn-b{font-family:'Noto Serif TC',serif;font-size:11px;font-weight:300;letter-spacing:0.16em;padding:13px 14px;border:0.5px solid rgba(138,85,32,0.14);background:transparent;color:var(--text-s);cursor:pointer;transition:color 0.12s;white-space:nowrap;}
.btn-b:hover{color:var(--text-m);}

/* 錯誤 */
.err{font-size:11px;letter-spacing:0.08em;color:#a03a1a;display:none;margin-bottom:10px;}
.err.on{display:block;}

/* 完成 */
.done-wrap{text-align:center;padding:48px 0 20px;}
.done-title{font-size:clamp(24px,6vw,34px);font-weight:200;letter-spacing:0.22em;color:var(--text);display:block;margin-bottom:12px;}
.done-divider{width:24px;height:0.5px;background:rgba(138,85,32,0.36);margin:14px auto;}
.done-sub{font-size:12px;font-weight:300;letter-spacing:0.10em;color:var(--text-s);line-height:2.2;}

/* 累積計數 */
.count-wrap{
  margin-top:28px;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.55s ease,transform 0.55s ease;
}
.count-wrap.visible{opacity:1;transform:translateY(0);}
.count-num{
  font-family:'Cormorant SC',serif;
  font-size:clamp(52px,14vw,80px);
  font-weight:300;
  letter-spacing:0.12em;
  color:var(--gold);
  line-height:1;
  display:block;
}
.count-label{
  font-size:9px;
  font-weight:200;
  letter-spacing:0.38em;
  color:var(--text-s);
  text-transform:uppercase;
  margin-top:8px;
  display:block;
}
.count-caption{
  font-size:11px;
  font-weight:300;
  letter-spacing:0.14em;
  color:var(--text-m);
  margin-top:10px;
  display:block;
  line-height:1.9;
}

/* 回聲句 */
.echo-wrap{
  margin:24px auto 0;
  max-width:320px;
  padding:18px 22px;
  border:0.5px solid rgba(138,85,32,0.18);
  background:rgba(255,255,255,0.38);
  backdrop-filter:blur(6px);
  opacity:0;
  transition:opacity 0.55s ease;
}
.echo-wrap.visible{opacity:1;}
.echo-loading{
  font-size:9px;letter-spacing:0.28em;color:var(--text-s);
  text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.echo-ring{
  width:10px;height:10px;
  border:0.5px solid rgba(138,85,32,0.20);
  border-top-color:rgba(138,85,32,0.55);
  border-radius:50%;
  animation:spin 0.9s linear infinite;
  flex-shrink:0;
}
.echo-text{
  font-size:13px;font-weight:300;
  letter-spacing:0.06em;
  color:var(--text-m);
  line-height:1.9;
  display:none;
}
.echo-text.visible{display:block;}
.done-home-btn{
  margin-top:24px;
  font-family:'Noto Serif TC',serif;
  font-size:11px;font-weight:300;letter-spacing:0.26em;
  padding:12px 32px;
  border:0.5px solid rgba(138,85,32,0.35);
  background:transparent;color:var(--text-m);
  cursor:pointer;text-transform:uppercase;
  transition:border-color 0.14s,color 0.14s;
  display:block;margin-left:auto;margin-right:auto;
}
.done-home-btn:hover{border-color:var(--gold);color:var(--gold);}

/* 載入 */
.loading{position:fixed;inset:0;z-index:200;background:rgba(254,246,238,0.90);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading.on{display:flex;}
.loading-ring{width:22px;height:22px;border:0.5px solid rgba(138,85,32,0.18);border-top-color:rgba(138,85,32,0.58);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:9px;letter-spacing:0.28em;color:var(--text-s);text-transform:uppercase;}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="loading-ring"></div><div class="loading-txt">記錄中</div></div>

<!-- 頂部 -->
<div class="topbar">
  <div class="top-logo">好日子</div>
  <div class="top-date" id="top-date"></div>
</div>

<!-- 進度條 -->
<div class="prog-bar-wrap" id="prog">
  <div class="prog-seg done"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
  <div class="prog-seg"></div>
</div>

<div class="main">

  <!-- 步驟 1：身體感覺 -->
  <div class="step active" id="sp-1">
    <div class="step-head">
      <div class="q-num">01 / 05</div>
      <div class="q-title">現在身體有什麼感覺？</div>
      <div class="q-sub">可以多選，從身體出發</div>
    </div>
    <div class="divider"></div>
    <div class="opts">
      <button class="opt" data-g="body" data-v="breath_open" onclick="pick(this)">呼吸順暢，氣進得來</button>
      <button class="opt" data-g="body" data-v="heartbeat_steady" onclick="pick(this)">心跳平穩，感覺踏實</button>
      <button class="opt" data-g="body" data-v="body_weighted" onclick="pick(this)">身體有力氣，感覺到重量</button>
      <button class="opt" data-g="body" data-v="stomach_calm" onclick="pick(this)">腸胃舒服，肚子安靜</button>
      <button class="opt" data-g="body" data-v="shoulders_loose" onclick="pick(this)">肩膀鬆，頭頸輕</button>
      <button class="opt" data-g="body" data-v="mind_clear" onclick="pick(this)">腦袋清楚，思緒流動</button>
    </div>
    <div class="err" id="err-1">至少選一個身體感覺</div>
    <div class="nav">
      <button class="btn-b" onclick="window.location.href='./app.html'">← 返回主頁</button>
      <button class="btn-n" onclick="goNext(1)">繼續</button>
    </div>
  </div>

  <!-- 步驟 2：睡眠 -->
  <div class="step" id="sp-2">
    <div class="step-head">
      <div class="q-num">02 / 05</div>
      <div class="q-title">昨晚睡得怎麼樣？</div>
      <div class="q-sub">選一個最接近的</div>
    </div>
    <div class="divider"></div>
    <div class="opts g2">
      <button class="opt" data-g="sleep" data-v="enough_rested" onclick="pick1(this,'sleep')">睡得夠，醒來有休息到</button>
      <button class="opt" data-g="sleep" data-v="slept_but_tired" onclick="pick1(this,'sleep')">睡了，但還是有點沒力</button>
      <button class="opt" data-g="sleep" data-v="fragmented" onclick="pick1(this,'sleep')">睡得零碎，沒有真的休息到</button>
      <button class="opt" data-g="sleep" data-v="short_but_managing" onclick="pick1(this,'sleep')">睡得少，但今天還可以撐</button>
    </div>
    <div class="err" id="err-2">請選擇睡眠狀況</div>
    <div class="sect">安眠藥</div>
    <div class="opts">
      <button class="opt" data-g="med" data-v="false" onclick="pickMed(this,'no')">沒有吃</button>
      <button class="opt" data-g="med" data-v="true" onclick="pickMed(this,'yes')">有吃</button>
    </div>
    <div class="med-layer" id="med-layer">
      <div class="sect" style="margin-top:0;">吃了之後效果如何</div>
      <div class="opts">
        <button class="opt" data-g="med_effect" data-v="effective" onclick="pick1(this,'med_effect')">吃了，睡得不錯</button>
        <button class="opt" data-g="med_effect" data-v="fragmented" onclick="pick1(this,'med_effect')">吃了，還是睡得零碎</button>
        <button class="opt" data-g="med_effect" data-v="still_exhausted" onclick="pick1(this,'med_effect')">吃了，但睡醒感覺很累</button>
      </div>
    </div>
    <div class="nav">
      <button class="btn-b" onclick="goBack(2)">← 上一步</button>
      <button class="btn-n" onclick="goNext(2)">繼續</button>
    </div>
  </div>

  <!-- 步驟 3：感官刺激 -->
  <div class="step" id="sp-3">
    <div class="step-head">
      <div class="q-num">03 / 05</div>
      <div class="q-title">今天有沒有哪一刻，感覺比較好一點？</div>
      <div class="q-sub">可以多選</div>
    </div>
    <div class="divider"></div>
    <div class="sect" style="margin-top:0;">嗅覺</div>
    <div class="opts">
      <button class="opt" data-g="sensory" data-v="smell_pleasant" onclick="pick(this)">聞到喜歡的味道</button>
      <button class="opt" data-g="sensory" data-v="smell_natural" onclick="pick(this)">聞到植物或自然的氣息</button>
    </div>
    <div class="sect">聽覺</div>
    <div class="opts">
      <button class="opt" data-g="sensory" data-v="sound_music" onclick="pick(this)">聽音樂</button>
      <button class="opt" data-g="sensory" data-v="sound_quiet" onclick="pick(this)">周圍很安靜</button>
      <button class="opt" data-g="sensory" data-v="sound_nature" onclick="pick(this)">自然聲音（雨聲、風聲）</button>
    </div>
    <div class="sect">光線</div>
    <div class="opts">
      <button class="opt" data-g="sensory" data-v="light_sun" onclick="pick(this)">曬到太陽</button>
      <button class="opt" data-g="sensory" data-v="light_soft" onclick="pick(this)">柔和的光</button>
    </div>
    <div class="sect">觸覺</div>
    <div class="opts">
      <button class="opt" data-g="sensory" data-v="touch_texture" onclick="pick(this)">摸到材質舒服的觸感</button>
      <button class="opt" data-g="sensory" data-v="touch_water" onclick="pick(this)">泡澡或洗熱水澡</button>
    </div>
    <div class="sect">溫度感受（單選）</div>
    <div class="temp-row">
      <button class="opt" data-g="st" data-v="temp_very_cold" onclick="pick1(this,'sensory_temp')">冷到縮起來</button>
      <button class="opt" data-g="st" data-v="temp_cool" onclick="pick1(this,'sensory_temp')">有點涼</button>
      <button class="opt" data-g="st" data-v="temp_just_right" onclick="pick1(this,'sensory_temp')">舒適溫度</button>
      <button class="opt" data-g="st" data-v="temp_warm" onclick="pick1(this,'sensory_temp')">有點暖</button>
      <button class="opt" data-g="st" data-v="temp_cozy" onclick="pick1(this,'sensory_temp')">暖烘烘</button>
      <button class="opt" data-g="st" data-v="temp_hot" onclick="pick1(this,'sensory_temp')">燥熱</button>
    </div>
    <div class="sect">戶外空氣</div>
    <div class="opts">
      <button class="opt" data-g="sensory" data-v="outdoor_fresh" onclick="pick(this)">吸到新鮮空氣</button>
      <button class="opt" data-g="sensory" data-v="outdoor_wind" onclick="pick(this)">風吹到臉</button>
    </div>
    <div class="err" id="err-3">至少選一個感官刺激</div>
    <div class="nav">
      <button class="btn-b" onclick="goBack(3)">← 上一步</button>
      <button class="btn-n" onclick="goNext(3)">繼續</button>
    </div>
  </div>

  <!-- 步驟 4：誰在場 -->
  <div class="step" id="sp-4">
    <div class="step-head">
      <div class="q-num">04 / 05</div>
      <div class="q-title">今天誰在你身邊？</div>
      <div class="q-sub">可以多選，選填</div>
    </div>
    <div class="divider"></div>
    <div class="opts">
      <button class="opt" data-g="who" data-v="alone" onclick="pick(this)">一個人</button>
      <button class="opt" data-g="who" data-v="family" onclick="pick(this)">家人</button>
      <button class="opt" data-g="who" data-v="partner" onclick="pick(this)">伴侶</button>
      <button class="opt" data-g="who" data-v="friends" onclick="pick(this)">朋友</button>
      <button class="opt" data-g="who" data-v="colleague" onclick="pick(this)">同事</button>
      <button class="opt" data-g="who" data-v="pet" onclick="pick(this)">寵物</button>
      <button class="opt" data-g="who" data-v="stranger" onclick="pick(this)">陌生人（咖啡廳、捷運等）</button>
    </div>
    <div class="nav">
      <button class="btn-b" onclick="goBack(4)">← 上一步</button>
      <button class="btn-n" onclick="goNext(4)">繼續</button>
    </div>
  </div>

  <!-- 步驟 5：做了什麼 -->
  <div class="step" id="sp-5">
    <div class="step-head">
      <div class="q-num">05 / 05</div>
      <div class="q-title">今天做了哪些讓你撐住的事？</div>
      <div class="q-sub">可以多選，選填</div>
    </div>
    <div class="divider"></div>
    <div class="opts">
      <button class="opt" data-g="activities" data-v="walk" onclick="pick(this)">散步或走路</button>
      <button class="opt" data-g="activities" data-v="exercise" onclick="pick(this)">運動</button>
      <button class="opt" data-g="activities" data-v="cook_eat" onclick="pick(this)">下廚或吃美食</button>
      <button class="opt" data-g="activities" data-v="watch" onclick="pick(this)">看劇或電影</button>
      <button class="opt" data-g="activities" data-v="read" onclick="pick(this)">讀書</button>
      <button class="opt" data-g="activities" data-v="create" onclick="pick(this)">創作或手作</button>
      <button class="opt" data-g="activities" data-v="talk" onclick="pick(this)">和人說說話</button>
      <button class="opt" data-g="activities" data-v="rest" onclick="pick(this)">什麼都沒做，就是待著</button>
      <button class="opt" data-g="activities" data-v="sleep" onclick="pick(this)">睡覺</button>
    </div>
    <div class="note-label">還有什麼想記下來的</div>
    <textarea class="note-inp" id="note-inp" placeholder="不用完整，幾個字也好" rows="2"></textarea>
    <div class="nav">
      <button class="btn-b" onclick="goBack(5)">← 上一步</button>
      <button class="btn-n" onclick="submit()">完成記錄</button>
    </div>
  </div>

  <!-- 完成 -->
  <div class="step" id="sp-done">
    <div class="done-wrap">
      <span class="done-title">記下來了</span>
      <div class="done-divider"></div>
      <div class="done-sub">今天這一頁，屬於你。</div>

      <!-- 累積計數 -->
      <div class="count-wrap" id="count-wrap">
        <span class="count-num" id="count-num">0</span>
        <span class="count-label">Records</span>
        <span class="count-caption" id="count-caption"></span>
      </div>

      <!-- 回聲句 -->
      <div class="echo-wrap" id="echo-wrap">
        <div class="echo-loading" id="echo-loading">
          <div class="echo-ring"></div>
        </div>
        <div class="echo-text" id="echo-text"></div>
      </div>
      <button class="done-home-btn" onclick="window.location.href='./app.html'" style="margin-top:28px;">回到主頁</button>
    </div>
  </div>

</div>

<script>
const SB='https://twnchuymiclgkklwccwn.supabase.co';
const KEY='sb_publishable_1Q7z_S42RLtxRphUbd9ekg_4AaVB7-m';
function tok(){try{const r=localStorage.getItem('sb-twnchuymiclgkklwccwn-auth-token');return r?JSON.parse(r).access_token||'':'';}catch{return '';}}
function aid(){try{const r=localStorage.getItem('sb-twnchuymiclgkklwccwn-auth-token');return r?JSON.parse(r).user?.id||'':'';}catch{return '';}}
async function sbFetch(path,method='GET',body=null){
  const o={method,headers:{'apikey':KEY,'Authorization':'Bearer '+tok(),'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(SB+'/rest/v1/'+path,o);
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

const S={body:[],sleep:null,sleep_med_used:null,sleep_med_effect:null,sensory:[],sensory_temp:null,who:[],activities:[],note:''};

function updateProg(n){
  document.querySelectorAll('.prog-seg').forEach((d,i)=>d.classList.toggle('done',i<n));
}
function showStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(n==='done'?'sp-done':'sp-'+n).classList.add('active');
  if(typeof n==='number')updateProg(n);
  document.querySelectorAll('.err').forEach(e=>e.classList.remove('on'));
  window.scrollTo({top:0,behavior:'smooth'});
}
function goNext(step){
  document.querySelectorAll('.err').forEach(e=>e.classList.remove('on'));
  if(step===1&&S.body.length===0){document.getElementById('err-1').classList.add('on');return;}
  if(step===2&&!S.sleep){document.getElementById('err-2').classList.add('on');return;}
  if(step===3&&S.sensory.length===0&&!S.sensory_temp){document.getElementById('err-3').classList.add('on');return;}
  if(step===5){submit();return;}
  showStep(step+1);
}
function goBack(step){showStep(step-1);}
function pick(btn){
  const g=btn.dataset.g;btn.classList.toggle('sel');const v=btn.dataset.v;
  if(!S[g])S[g]=[];
  if(btn.classList.contains('sel')){if(!S[g].includes(v))S[g].push(v);}
  else{S[g]=S[g].filter(x=>x!==v);}
}
function pick1(btn,group){
  btn.closest('.opts,.temp-row,.med-layer')?.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');S[group]=btn.dataset.v;
}
function pickMed(btn,mode){
  document.querySelectorAll('[data-g="med"]').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');S.sleep_med_used=mode==='yes';
  document.getElementById('med-layer').classList.toggle('open',mode==='yes');
  if(mode==='no')S.sleep_med_effect=null;
}
function setDate(){
  const d=new Date();const days=['日','一','二','三','四','五','六'];
  document.getElementById('top-date').textContent=`${d.getMonth()+1}.${d.getDate()} 週${days[d.getDay()]}`;
}
/* 選項值對應中文標籤 */
const LABELS={
  body:{
    breath_open:'呼吸順暢，氣進得來',
    heartbeat_steady:'心跳平穩，感覺踏實',
    body_weighted:'身體有力氣，感覺到重量',
    stomach_calm:'腸胃舒服，肚子安靜',
    shoulders_loose:'肩膀鬆，頭頸輕',
    mind_clear:'腦袋清楚，思緒流動'
  },
  sensory:{
    smell_pleasant:'聞到喜歡的味道',
    smell_natural:'聞到植物或自然的氣息',
    sound_music:'聽音樂',
    sound_quiet:'周圍很安靜',
    sound_nature:'自然聲音（雨聲、風聲）',
    light_sun:'曬到太陽',
    light_soft:'柔和的光',
    touch_texture:'摸到材質舒服的觸感',
    touch_water:'泡澡或洗熱水澡',
    outdoor_fresh:'吸到新鮮空氣',
    outdoor_wind:'風吹到臉',
    temp_very_cold:'冷到縮起來',
    temp_cool:'有點涼',
    temp_just_right:'舒適溫度',
    temp_warm:'有點暖',
    temp_cozy:'暖烘烘',
    temp_hot:'燥熱'
  },
  activities:{
    walk:'散步或走路',
    exercise:'運動',
    cook_eat:'下廚或吃美食',
    watch:'看劇或電影',
    read:'讀書',
    create:'創作或手作',
    talk:'和人說說話',
    rest:'什麼都沒做，就是待著',
    sleep:'睡覺'
  }
};

function getLabels(keys,map){return keys.map(k=>map[k]).filter(Boolean);}

/* 累積計數：查詢並播放數字動畫 */
async function fetchAndAnimateCount(uid){
  try{
    const res=await sbFetch('records?select=id&user_id=eq.'+uid);
    const total=res?.length||1;
    const wrap=document.getElementById('count-wrap');
    const numEl=document.getElementById('count-num');
    const captionEl=document.getElementById('count-caption');

    captionEl.textContent=total===1
      ?'這是你的第一筆，累積開始了。'
      :'每一筆都在拼出你的好日子配方。';

    /* easeOutExpo 數字滾動 */
    const duration=900;
    const startTime=performance.now();
    function tick(now){
      const elapsed=now-startTime;
      const progress=Math.min(elapsed/duration,1);
      const ease=progress===1?1:1-Math.pow(2,-10*progress);
      numEl.textContent=Math.round(ease*total);
      if(progress<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    setTimeout(()=>wrap.classList.add('visible'),80);
  }catch(e){
    console.error('計數查詢失敗',e);
    /* 失敗時靜默，不影響畫面 */
  }
}

async function generateEcho(){
  const bodyLabels=getLabels(S.body,LABELS.body);
  const sensoryAll=[...S.sensory,...(S.sensory_temp?[S.sensory_temp]:[])];
  const sensoryLabels=getLabels(sensoryAll,LABELS.sensory);
  const activityLabels=getLabels(S.activities,LABELS.activities);

  const parts=[];
  if(bodyLabels.length)parts.push('身體感覺：'+bodyLabels.join('、'));
  if(sensoryLabels.length)parts.push('今天的感官：'+sensoryLabels.join('、'));
  if(activityLabels.length)parts.push('做了什麼：'+activityLabels.join('、'));

  const userContent=parts.join('\n')||'（使用者這次只完成了基本記錄，沒有更多細節）';

  const prompt=`你是一個陪伴性的記錄工具。使用者剛完成了一次好日子記錄，以下是他們今天的狀態：

${userContent}

請根據這些內容，生成一句話，放在記錄完成的畫面上。

這句話的語感參考：
「有些感受，不需要被說清楚，也可以被放在這裡。」
「就算只是撐著，也是一種很真實的前行。」
「慢一點沒有關係，你正在用自己的方式走著。」
「讓自己待在這個片刻，也是一種方式。」

語感說明：
不點名今天做了什麼，不具體描述行為。用「有些」「這樣」「一點」這類模糊而包容的詞。動詞輕——撐著、待著、走著、放著。句子有留白，讀完有餘韻，不是結論，是陪伴。不激勵，不讚美，不分析。

規則：
1. 只輸出那一句話，不要任何前言或解釋
2. 不直接描述使用者選了什麼，讓句子可以涵蓋各種狀態
3. 不使用「今天你做了」「你選擇了」這類具體敘述句型
4. 帶有「你」這個主體
5. 句子長度在14到22個字之間，最多一個逗號
6. 不煽情，不誇張，不給建議

只輸出那一句話。`;

  const echoWrap=document.getElementById('echo-wrap');
  const echoLoading=document.getElementById('echo-loading');
  const echoText=document.getElementById('echo-text');

  echoWrap.classList.add('visible');

  try{
    const res=await fetch('https://twnchuymiclgkklwccwn.supabase.co/functions/v1/claude-proxy',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+tok()
      },
      body:JSON.stringify({prompt})
    });
    const data=await res.json();
    const sentence=data.sentence||'';
    echoLoading.style.display='none';
    const display=sentence||'今天這一頁，留下來了。';
    echoText.innerHTML=display.replace(/，/g,'，<br>');
    echoText.classList.add('visible');
  }catch(err){
    console.error('回聲句生成失敗',err);
    echoLoading.style.display='none';
    echoText.innerHTML='今天這一頁，<br>留下來了。';
    echoText.classList.add('visible');
  }
}

async function submit(){
  S.note=document.getElementById('note-inp').value.trim();
  const L=document.getElementById('loading');L.classList.add('on');
  try{
    const a=aid();if(!a)throw new Error('尚未登入，請先登入後再記錄');
    const u=await sbFetch('users?select=id&auth_id=eq.'+a);if(!u?.length)throw new Error('找不到使用者');
    const uid=u[0].id;
    const rec=await sbFetch('records','POST',{user_id:uid,record_type:'good_day',note:S.note||null,time_sense:null});
    if(!rec?.length)throw new Error('建立記錄失敗');const rid=rec[0].id;
    if(S.body.length)await sbFetch('record_body_sensations','POST',S.body.map(s=>({record_id:rid,sensation:s})));
    await sbFetch('record_sleep','POST',{record_id:rid,quality:S.sleep||null,sleep_med_used:S.sleep_med_used===null?false:S.sleep_med_used,sleep_med_effect:S.sleep_med_effect||null});
    const sa=[...S.sensory,...(S.sensory_temp?[S.sensory_temp]:[])];
    if(sa.length)await sbFetch('record_sensory','POST',sa.map(v=>({record_id:rid,category:v,note:null})));
    if(S.who.length)await sbFetch('record_who','POST',S.who.map(n=>({record_id:rid,ad_hoc_name:n})));
    if(S.activities.length)await sbFetch('record_activities','POST',S.activities.map(a=>({record_id:rid,activity:a})));
    L.classList.remove('on');
    showStep('done');
    fetchAndAnimateCount(uid); /* 非同步，不影響主流程 */
    generateEcho();            /* 非同步，不影響主流程 */
  }catch(e){L.classList.remove('on');console.error(e);alert('記錄時出了問題：'+e.message);}
}
document.addEventListener('DOMContentLoaded',()=>{setDate();});
</script>
</body>
</html>
