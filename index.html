<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的心理使用手冊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --ink: #1C1C1A;
      --ink-mid: #5A5855;
      --ink-faint: #A8A5A0;
      --accent: #8B7FA8;
      --line: #E8E4DF;
      --radius-sm: 6px;
      --radius: 10px;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--ink);
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { display: flex; flex-direction: column; gap: 10px; }

    .wordmark {
      font-family: 'Noto Serif TC', serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--ink-faint);
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.45;
      color: var(--ink);
    }

    .tagline {
      font-size: 13px;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.7;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }

    .card-section { padding: 24px; }
    .card-divider { height: 1px; background: var(--line); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
      margin-bottom: 16px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 300;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-google:hover { border-color: var(--ink-faint); background: #F0EDE9; }

    .google-logo { width: 16px; height: 16px; flex-shrink: 0; }

    .input-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--ink-mid); background: #fff; }
    input::placeholder { color: var(--ink-faint); font-weight: 300; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--ink);
      color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 14px;
    }

    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

    .toggle-row {
      font-size: 12px;
      color: var(--ink-faint);
      text-align: center;
      font-weight: 300;
    }

    .toggle-row span {
      color: var(--ink-mid);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .msg {
      font-size: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      display: none;
      line-height: 1.5;
      font-weight: 300;
    }

    .msg.error   { background: #FDF0F0; color: #9E3A3A; border: 1px solid #F0D8D8; display: block; }
    .msg.success { background: #F2F7F3; color: #2D6E4A; border: 1px solid #C5E0CE; display: block; }

    .footer {
      font-size: 11px;
      color: var(--ink-faint);
      text-align: center;
      line-height: 1.8;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <p class="wordmark">心理使用手冊</p>
      <h1>認識自己，<br>從記錄開始。</h1>
      <p class="tagline">每一筆記錄，都是對自己更深的理解。</p>
    </div>

    <div class="card">
      <div class="card-section">
        <p class="section-label">以社群帳號登入</p>
        <button class="btn-google" onclick="loginWithGoogle()">
          <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          以 Google 帳號繼續
        </button>
      </div>

      <div class="card-divider"></div>

      <div class="card-section">
        <p class="section-label">以 Email 登入</p>
        <div class="input-stack">
          <input type="email" id="email" placeholder="電子郵件" autocomplete="email" />
          <input type="password" id="password" placeholder="密碼（至少 6 個字元）" autocomplete="current-password" />
        </div>
        <div class="msg" id="msg"></div>
        <button class="btn-primary" id="mainBtn" onclick="handleEmail()">登入</button>
        <div class="toggle-row">還沒有帳號？<span onclick="toggleMode()">建立帳號</span></div>
      </div>
    </div>

    <p class="footer">你的記錄只屬於你。<br>我們不會識別或分享你的個人資料。</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://twnchuymiclgkklwccwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1Q7z_S42RLtxRphUbd9ekg_4AaVB7-m';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    let isSignup = false;

    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'app.html';
    });

    function toggleMode() {
      isSignup = !isSignup;
      document.getElementById('mainBtn').textContent = isSignup ? '建立帳號' : '登入';
      document.querySelector('.toggle-row').innerHTML = isSignup
        ? '已有帳號？<span onclick="toggleMode()">直接登入</span>'
        : '還沒有帳號？<span onclick="toggleMode()">建立帳號</span>';
      clearMsg();
    }

    async function loginWithGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://chou-psy.github.io/psy-app/app.html' }
      });
      if (error) showMsg(error.message, 'error');
    }

    async function handleEmail() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('mainBtn');
      if (!email || !password) { showMsg('請填入 Email 和密碼', 'error'); return; }
      btn.disabled = true; btn.textContent = '處理中⋯';
      const { error } = isSignup
        ? await sb.auth.signUp({ email, password })
        : await sb.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg(translateError(error.message), 'error');
        btn.disabled = false;
        btn.textContent = isSignup ? '建立帳號' : '登入';
      } else if (isSignup) {
        showMsg('帳號建立成功！請確認你的電子郵件。', 'success');
        btn.disabled = false; btn.textContent = '建立帳號';
      } else {
        location.href = 'app.html';
      }
    }

    function translateError(msg) {
      if (msg.includes('Invalid login')) return 'Email 或密碼不正確';
      if (msg.includes('Email not confirmed')) return '請先確認你的電子郵件';
      if (msg.includes('already registered')) return '這個 Email 已經註冊過了';
      if (msg.includes('Password should be')) return '密碼至少需要 6 個字元';
      return msg;
    }

    function showMsg(t, type) { const e = document.getElementById('msg'); e.textContent = t; e.className = 'msg ' + type; }
    function clearMsg() { document.getElementById('msg').className = 'msg'; }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleEmail(); });
  </script>
</body>
</html>
