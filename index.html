<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的心理使用手冊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #A87CC2;
      --pink: #C96FA8;
      --grad: linear-gradient(135deg, #A87CC2, #C96FA8);
      --bg: #FAF8FC;
      --text: #2D2035;
      --sub: #7A6A85;
      --card: #FFFFFF;
      --radius: 16px;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--grad);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(168,124,194,0.3);
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .sub {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
      text-align: center;
      max-width: 280px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(168,124,194,0.10);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-title {
      font-size: 13px;
      color: var(--sub);
      letter-spacing: 0.06em;
      text-align: center;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1.5px solid #E8E0F0;
      background: #fff;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-google:hover {
      border-color: var(--purple);
      background: #F9F5FF;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(168,124,194,0.15);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #C8BFD4;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #EDE8F4;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid #E8E0F0;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: #FDFBFF;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--purple); background: #fff; }
    input::placeholder { color: #C0B4CC; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--grad);
      color: #fff;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(168,124,194,0.3);
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(168,124,194,0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .toggle-mode {
      text-align: center;
      font-size: 13px;
      color: var(--sub);
    }

    .toggle-mode span {
      color: var(--purple);
      cursor: pointer;
      font-weight: 500;
    }

    .msg {
      font-size: 13px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }

    .msg.error { background: #FFF0F5; color: #C94080; display: block; }
    .msg.success { background: #F0FFF8; color: #2D9E6B; display: block; }

    .footer-note {
      font-size: 11px;
      color: #BEB0CC;
      text-align: center;
      line-height: 1.6;
    }

    .google-logo {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-area">
      <div class="logo-icon">📖</div>
      <h1>我的心理使用手冊</h1>
      <p class="sub">每一筆記錄，都是對自己更深的認識。</p>
    </div>

    <div class="card">
      <p class="card-title">登入或建立帳號</p>

      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        以 Google 帳號繼續
      </button>

      <div class="divider">或使用 Email</div>

      <div class="input-group">
        <input type="email" id="email" placeholder="電子郵件" autocomplete="email" />
        <input type="password" id="password" placeholder="密碼（至少 6 個字元）" autocomplete="current-password" />
      </div>

      <div class="msg" id="msg"></div>

      <button class="btn-primary" id="mainBtn" onclick="handleEmail()">登入</button>

      <div class="toggle-mode">
        還沒有帳號？<span onclick="toggleMode()">建立帳號</span>
      </div>
    </div>

    <p class="footer-note">你的記錄只屬於你。<br>我們不會識別或分享你的個人資料。</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://twnchuymiclgkklwccwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1Q7z_S42RLtxRphUbd9ekg_4AaVB7-m';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignup = false;

    // 已登入直接跳轉
    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'app.html';
    });

    function toggleMode() {
      isSignup = !isSignup;
      document.getElementById('mainBtn').textContent = isSignup ? '建立帳號' : '登入';
      document.querySelector('.toggle-mode').innerHTML = isSignup
        ? '已有帳號？<span onclick="toggleMode()">直接登入</span>'
        : '還沒有帳號？<span onclick="toggleMode()">建立帳號</span>';
      clearMsg();
    }

    async function loginWithGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://chou-psy.github.io/psy-app/app.html' }
      });
      if (error) showMsg(error.message, 'error');
    }

    async function handleEmail() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('mainBtn');

      if (!email || !password) { showMsg('請填入 Email 和密碼', 'error'); return; }

      btn.disabled = true;
      btn.textContent = '處理中…';

      let result;
      if (isSignup) {
        result = await sb.auth.signUp({ email, password });
      } else {
        result = await sb.auth.signInWithPassword({ email, password });
      }

      const { data, error } = result;

      if (error) {
        showMsg(translateError(error.message), 'error');
        btn.disabled = false;
        btn.textContent = isSignup ? '建立帳號' : '登入';
      } else if (isSignup) {
        showMsg('帳號建立成功！請確認你的電子郵件。', 'success');
        btn.disabled = false;
        btn.textContent = '建立帳號';
      } else {
        location.href = 'app.html';
      }
    }

    function translateError(msg) {
      if (msg.includes('Invalid login')) return 'Email 或密碼不正確';
      if (msg.includes('Email not confirmed')) return '請先確認你的電子郵件';
      if (msg.includes('already registered')) return '這個 Email 已經註冊過了';
      if (msg.includes('Password should be')) return '密碼至少需要 6 個字元';
      return msg;
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    function clearMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleEmail();
    });
  </script>
</body>
</html>
