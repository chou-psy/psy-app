<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心理使用手冊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Noto+Sans+TC:wght@200;300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F1117;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.10);
      --border-active: rgba(201,169,110,0.6);
      --ink: #F2EFE8;
      --ink-mid: rgba(242,239,232,0.55);
      --ink-faint: rgba(242,239,232,0.28);
      --gold: #C9A96E;
      --gold-soft: rgba(201,169,110,0.08);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      color: var(--ink);
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    /* ── 進場動畫 ── */
    .fade-line {
      opacity: 0;
      transform: translateY(10px);
      animation: fadein 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .fade-line:nth-child(1) { animation-delay: 0.1s; }
    .fade-line:nth-child(2) { animation-delay: 0.35s; }
    .fade-line:nth-child(3) { animation-delay: 0.55s; }

    @keyframes fadein {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      animation: fadein 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    .wordmark {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 34px;
      font-weight: 200;
      line-height: 1.4;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .tagline {
      font-size: 13px;
      font-weight: 200;
      color: var(--ink-mid);
      line-height: 1.85;
      letter-spacing: 0.04em;
    }

    /* ── 登入區 ── */
    .login-block {
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 0;
      animation: fadein 1s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
    }

    .block-label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Google 按鈕 */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 15px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 200;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.06em;
      margin-bottom: 1px;
    }

    .btn-google:hover {
      background: var(--surface-hover);
      border-color: rgba(255,255,255,0.2);
    }

    .google-logo { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.8; }

    /* 分隔線 */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    /* Input */
    .input-stack { display: flex; flex-direction: column; gap: 1px; margin-bottom: 24px; }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 200;
      color: var(--ink);
      outline: none;
      transition: all 0.25s;
      letter-spacing: 0.04em;
    }

    input:focus {
      border-color: var(--border-active);
      background: var(--gold-soft);
    }

    input::placeholder { color: var(--ink-faint); letter-spacing: 0.04em; }

    /* 訊息 */
    .msg {
      font-size: 11px;
      font-weight: 200;
      padding: 10px 0;
      margin-bottom: 16px;
      display: none;
      line-height: 1.6;
      letter-spacing: 0.04em;
    }

    .msg.error   { color: #E8A090; display: block; }
    .msg.success { color: #90C8A8; display: block; }

    /* 主按鈕 */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--bg);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--ink);
    }

    .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }

    .toggle-row {
      font-size: 11px;
      font-weight: 200;
      color: var(--ink-faint);
      text-align: center;
      letter-spacing: 0.06em;
    }

    .toggle-row span {
      color: var(--gold);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .toggle-row span:hover { opacity: 0.7; }

    /* Footer */
    .footer {
      font-size: 10px;
      font-weight: 200;
      color: var(--ink-faint);
      text-align: center;
      line-height: 2;
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadein 1s ease 1s forwards;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <p class="wordmark">心理使用手冊</p>
      <h1>認識自己，<br>從記錄開始。</h1>
      <p class="tagline">每一筆記錄，都是對自己更深的理解。<br>越用越認識自己，沒有人可以替代它給你的東西。</p>
    </div>

    <div class="login-block">
      <p class="block-label">登入</p>

      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        以 Google 帳號繼續
      </button>

      <div class="divider"><span class="divider-text">或</span></div>

      <div class="input-stack">
        <input type="email" id="email" placeholder="電子郵件" autocomplete="email" />
        <input type="password" id="password" placeholder="密碼" autocomplete="current-password" />
      </div>

      <div class="msg" id="msg"></div>
      <button class="btn-primary" id="mainBtn" onclick="handleEmail()">登入</button>
      <div class="toggle-row">還沒有帳號？<span onclick="toggleMode()">建立帳號</span></div>
    </div>

    <p class="footer">你的記錄只屬於你。<br>我們不會識別或分享你的個人資料。</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://twnchuymiclgkklwccwn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1Q7z_S42RLtxRphUbd9ekg_4AaVB7-m';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    let isSignup = false;

    sb.auth.getSession().then(({ data }) => { if (data.session) location.href = 'app.html'; });

    function toggleMode() {
      isSignup = !isSignup;
      document.getElementById('mainBtn').textContent = isSignup ? '建立帳號' : '登入';
      document.querySelector('.toggle-row').innerHTML = isSignup
        ? '已有帳號？<span onclick="toggleMode()">直接登入</span>'
        : '還沒有帳號？<span onclick="toggleMode()">建立帳號</span>';
      clearMsg();
    }

    async function loginWithGoogle() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://chou-psy.github.io/psy-app/app.html' }
      });
      if (error) showMsg(error.message, 'error');
    }

    async function handleEmail() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('mainBtn');
      if (!email || !password) { showMsg('請填入 Email 和密碼', 'error'); return; }
      btn.disabled = true; btn.textContent = '處理中';
      const { error } = isSignup
        ? await sb.auth.signUp({ email, password })
        : await sb.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg(translateError(error.message), 'error');
        btn.disabled = false; btn.textContent = isSignup ? '建立帳號' : '登入';
      } else if (isSignup) {
        showMsg('帳號建立成功。請確認你的電子郵件。', 'success');
        btn.disabled = false; btn.textContent = '建立帳號';
      } else { location.href = 'app.html'; }
    }

    function translateError(msg) {
      if (msg.includes('Invalid login')) return 'Email 或密碼不正確';
      if (msg.includes('Email not confirmed')) return '請先確認你的電子郵件';
      if (msg.includes('already registered')) return '這個 Email 已經註冊過了';
      if (msg.includes('Password should be')) return '密碼至少需要 6 個字元';
      return msg;
    }

    function showMsg(t, type) { const e = document.getElementById('msg'); e.textContent = t; e.className = 'msg ' + type; }
    function clearMsg() { document.getElementById('msg').className = 'msg'; }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleEmail(); });
  </script>
</body>
</html>
